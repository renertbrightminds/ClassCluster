<style>
@import url('https://fonts.googleapis.com/css2?family=Fraunces:wght@700;900&family=Inter:wght@400;500;600&display=swap');
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{
  --bg:#05080f; --surface:#0d1117; --surface2:#111720;
  --border:#1c2333; --text:#e6edf3; --muted:#768390;
  --accent:#58a6ff; --green:#3fb950; --amber:#d29922;

body{background:var(--bg);color:var(--text);font-family:'Inter',sans-serif;font-size:14px;min-height:100vh;}
a{color:inherit;text-decoration:none;}

header{display:flex;align-items:center;justify-content:space-between;padding:20px 40px;border-bottom:1px solid var(--border);}
header h1{font-family:'Fraunces',serif;font-size:24px;font-weight:900;color:#e6edf3;}

.nav-link{background:transparent;border:1px solid var(--border);color:var(--muted);padding:8px 18px;border-radius:8px;font-family:inherit;font-size:13px;font-weight:600;cursor:pointer;display:inline-flex;align-items:center;gap:6px;transition:all .15s;}
.nav-link:hover{border-color:var(--accent);color:var(--accent);}

main{max-width:1200px;margin:0 auto;padding:28px 24px 80px;}

.tabs{display:flex;gap:0;border-bottom:1px solid var(--border);margin-bottom:24px;}
.tab{padding:10px 22px;font-size:13px;font-weight:600;cursor:pointer;color:var(--muted);border-bottom:2px solid transparent;transition:all .15s;background:none;border-top:none;border-left:none;border-right:none;font-family:inherit;}
.tab:hover{color:var(--text);}
.tab.active{color:var(--accent);border-bottom-color:var(--accent);}

.spinner{text-align:center;color:var(--muted);font-size:13px;padding:40px;}
.dot-spin{display:inline-block;animation:spin 1s linear infinite;}
@keyframes spin{to{transform:rotate(360deg)}}
.error-box{background:rgba(248,81,73,.08);border:1px solid rgba(248,81,73,.3);border-radius:10px;padding:12px 18px;color:#ffa198;font-size:13px;margin-bottom:20px;display:none;}

.metrics{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:24px;}
.metric{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:16px;}
.metric-label{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.07em;margin-bottom:4px;}
.metric-value{font-size:26px;font-weight:700;font-family:'Fraunces',serif;}
.metric-value.warn{color:var(--amber);}
.metric-value.crit{color:var(--red);}
.metric-value.ok{color:var(--green);}

.inst-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:10px;}
.inst-card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:14px;cursor:pointer;transition:border-color .15s;}
.inst-card:hover{border-color:var(--accent);}
.inst-card.inactive{opacity:.4;}
.inst-avatar{width:38px;height:38px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;margin-bottom:8px;}
.inst-name{font-weight:600;font-size:14px;margin-bottom:2px;}
.inst-sub{font-size:11px;color:var(--muted);}
.badge{display:inline-block;padding:2px 7px;border-radius:8px;font-size:10px;font-weight:600;margin:1px;}
.b-green{background:rgba(63,185,80,.15);color:#3fb950;}
.b-red{background:rgba(248,81,73,.12);color:#ffa198;}
.b-amber{background:rgba(210,153,34,.12);color:#e3b341;}

.back-btn{background:transparent;border:none;color:var(--muted);font-size:13px;cursor:pointer;padding:0;margin-bottom:16px;font-family:inherit;display:flex;align-items:center;gap:5px;}

.profile-header{display:flex;align-items:center;gap:16px;margin-bottom:20px;padding:20px;background:var(--surface);border:1px solid var(--border);border-radius:14px;}
.profile-avatar{width:56px;height:56px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:20px;font-weight:700;flex-shrink:0;}

.refresh-btn{background:transparent;border:1px solid var(--border);color:var(--muted);padding:7px 14px;border-radius:7px;font-family:inherit;font-size:12px;cursor:pointer;}
.refresh-btn:hover{color:var(--text);border-color:var(--muted);}
.refresh-btn.spinning{animation:spin .8s linear infinite;pointer-events:none;}
</style>

<header>

<main>

<script>
// ════════════════════════════════════════════════════════

// ════════════════════════════════════════════════════════

  "Shweta":   {levelPref:"", maxNew:0, note:"No longer with Bright Minds as of mid January 2026.", active:false},

  "Tara":     {levelPref:"1A-3A", maxNew:0, note:"Only wants the 2 current classes for now (per March 2/26 WhatsApp).", active:true},
  "Trisha":   {levelPref:"Ages 8+", maxNew:0, note:"Not taking new classes.", active:true},
};

const AVATAR_COLORS = [
  {bg:"rgba(88,166,255,.15)",txt:"#79c0ff"},
  {bg:"rgba(63,185,80,.15)",txt:"#56d364"},
  {bg:"rgba(188,140,255,.15)",txt:"#d2a8ff"},
  {bg:"rgba(210,153,34,.15)",txt:"#e3b341"},
  {bg:"rgba(248,81,73,.12)",txt:"#ffa198"},
  {bg:"rgba(240,165,0,.12)",txt:"#f0c040"},
  {bg:"rgba(118,131,144,.15)",txt:"#adbac7"},
];
function avatarColor(name) { return AVATAR_COLORS[name.charCodeAt(0)%AVATAR_COLORS.length]; }
function initials(name) { return name.split(" ").map(w=>w[0]).join("").slice(0,2).toUpperCase(); }

// ════════════════════════════════════════════════════════
// STATE
// ════════════════════════════════════════════════════════
let allClasses = [];
let activeTab = 'instructors';
let selectedInstructor = null;

// ════════════════════════════════════════════════════════
// DATA FETCH
// ════════════════════════════════════════════════════════
function showError(msg) {
  const el = document.getElementById("error-box");
  if (msg) { el.textContent = "⚠ " + msg; el.style.display = "block"; }
  else el.style.display = "none";
}
function showSpinner(on) {
  document.getElementById("spinner").style.display = on ? "block" : "none";
}

function fetchData() {
  if (!CONFIG.dataUrl) { showError("No dataUrl set in CONFIG."); return; }
  const btn = document.getElementById("refresh-btn");
  btn.classList.add("spinning");
  showError(null); showSpinner(true);
  document.getElementById("app").style.display = "none";
  const proxyUrl = "https://corsproxy.io/?" + encodeURIComponent(CONFIG.dataUrl);
  fetch(proxyUrl, {cache:"no-cache"})
    .then(r => { if (!r.ok) throw new Error(`HTTP ${r.status}`); return r.text(); })
    .then(text => {
      allClasses = parseCSV(text);
      document.getElementById("app").style.display = "block";
      renderAll();
      const now = new Date();
      document.getElementById("last-updated").textContent =
        "Updated " + now.toLocaleTimeString(undefined,{hour:"2-digit",minute:"2-digit"});
    })
    .catch(err => showError("Could not fetch data: " + err.message))
    .finally(() => { btn.classList.remove("spinning"); showSpinner(false); });
}

function parseCSV(text) {
  const lines = text.trim().split(/\r?\n/);
  const hdr = lines[0].split(",").map(h=>h.trim().toLowerCase());
  const ci = hdr.indexOf("classid")>=0 ? hdr.indexOf("classid") : hdr.indexOf("class");
  const di = hdr.indexOf("day"), ti = hdr.indexOf("time");
  const ii = hdr.indexOf("instructor");
  const shi = hdr.indexOf("shadows");
  const deli = hdr.indexOf("delivery");
  const oi = hdr.indexOf("comment");
  if (ci < 0) return [];
  const map = {}, meta = {};
  for (let i = 1; i < lines.length; i++) {
    const c = lines[i].split(",").map(v=>v.trim());
    if (c.length < 2) continue;
    const cn = c[ci]; if (!cn) continue;
    if (!map[cn]) {
      map[cn] = [];
      meta[cn] = {
        classId: cn,
        day:       di>=0  ? c[di]  : "",
        time:      ti>=0  ? c[ti]  : "",
        instructor:ii>=0  ? c[ii]  : "",
        shadows:   shi>=0 ? c[shi].split(";").map(s=>s.trim()).filter(Boolean) : [],
        delivery:  deli>=0? (c[deli].toLowerCase().includes("online")?"online":"in-person") : "",
        comment:   oi>=0  ? c[oi]  : "",
      };
    }
    const gi = hdr.indexOf("grade"), bi = hdr.indexOf("ability")>=0?hdr.indexOf("ability"):hdr.indexOf("level");
    const ni = hdr.indexOf("name");
    if (ni>=0 && gi>=0 && bi>=0 && c[ni]) {
      map[cn].push({name:c[ni], grade:parseFloat(c[gi])||0, ability:parseFloat(c[bi])||0});
    }
  }
  return Object.entries(map).map(([cn,students])=>({...meta[cn], className:cn, students}));
}

// ════════════════════════════════════════════════════════
// HELPERS
// ════════════════════════════════════════════════════════

// Normalize a name from the CSV to match INSTRUCTOR_PROFILES keys (first name only).
// Strategy: if the full name starts with a known profile key (case-insensitive), use that key.
// Otherwise fall back to the first word of the name.
const _profileKeysByFirstName = {};
Object.keys(INSTRUCTOR_PROFILES).forEach(k => {
  _profileKeysByFirstName[k.toLowerCase()] = k;
});

function normalizeName(rawName) {
  const trimmed = (rawName || "").trim();
  // Direct match first
  if (INSTRUCTOR_PROFILES[trimmed]) return trimmed;
  const lower = trimmed.toLowerCase();
  const firstWord = lower.split(" ")[0];
  // Check if trimmed starts with a known profile key e.g. "Alice Schroeder" → "Alice"
  for (const [profileKey, key] of Object.entries(_profileKeysByFirstName)) {
    if (lower === profileKey || lower.startsWith(profileKey + " ")) return key;
  }
  // Check if first word of raw name matches first word of any profile key
  // e.g. "Elena" matches "Elena B"
  for (const [profileKey, key] of Object.entries(_profileKeysByFirstName)) {
    if (profileKey.split(" ")[0] === firstWord) return key;
  }
  // Fall back to first word
  return trimmed.split(" ")[0];
}

function allInstructorNames() {
  const names = new Set();
  allClasses.forEach(c => {
    if (c.instructor) names.add(normalizeName(c.instructor));
    (c.shadows||[]).forEach(s => names.add(normalizeName(s)));
  });
  // Also include profiles not yet in CSV
  Object.keys(INSTRUCTOR_PROFILES).forEach(n => names.add(n));
  return [...names].sort();
}

function classesForInstructor(name) {
  const lead   = allClasses.filter(c => normalizeName(c.instructor||"") === name);
  const shadow = allClasses.filter(c => (c.shadows||[]).map(s=>normalizeName(s)).includes(name));
  return {lead, shadow};
}

function shadowKey(classId, name) {
  return `bm_shadow_${classId}_${name.replace(/\s+/g,'_')}`;
}
function getShadowData(classId, name) {
  try { return JSON.parse(localStorage.getItem(shadowKey(classId,name))) || {sessions:0,notes:'',cleared:false}; }
  catch { return {sessions:0,notes:'',cleared:false}; }
}
function saveShadowData(classId, name, data) {
  try { localStorage.setItem(shadowKey(classId,name), JSON.stringify(data)); } catch {}
}

// ════════════════════════════════════════════════════════
// TAB ROUTING
// ════════════════════════════════════════════════════════
function showTab(tab, btn) {
  activeTab = tab;
  selectedInstructor = null;
  document.querySelectorAll(".tab").forEach(t=>t.classList.remove("active"));
  if (btn) btn.classList.add("active");
  ["instructors","availability","conflicts","shadows"].forEach(t => {
    document.getElementById("tab-"+t).style.display = t===tab ? "" : "none";
  });
  renderTab(tab);
}

function renderAll() {
  renderTab('instructors');
  // Pre-render other tabs lazily on first switch
}

function renderTab(tab) {
  if (tab === 'instructors') renderInstructors();
  else if (tab === 'availability') renderAvailability();
  else if (tab === 'conflicts') renderConflicts();
  else if (tab === 'shadows') renderShadows();
}

// ════════════════════════════════════════════════════════
// TAB 1 — INSTRUCTORS
// ════════════════════════════════════════════════════════
function renderInstructors() {
  const el = document.getElementById("tab-instructors");
  if (selectedInstructor) { renderProfile(el, selectedInstructor); return; }

  const names = allInstructorNames();
  const active = names.filter(n=>(INSTRUCTOR_PROFILES[n]?.active ?? true));
  const inactive = names.filter(n=>INSTRUCTOR_PROFILES[n]?.active===false);
  const openToNew = active.filter(n=>{const p=INSTRUCTOR_PROFILES[n]; return p?.maxNew && p.maxNew>0;});
  const maxed = active.filter(n=>INSTRUCTOR_PROFILES[n]?.maxNew===0);
  const totalShadowRelationships = allClasses.reduce((s,c)=>s+(c.shadows||[]).length,0);

  el.innerHTML = `
    <div class="metrics">
      <div class="metric"><div class="metric-label">Active instructors</div><div class="metric-value ok">${active.length}</div></div>
      <div class="metric"><div class="metric-label">Open to new classes</div><div class="metric-value ok">${openToNew.length}</div></div>
      <div class="metric"><div class="metric-label">Maxed out</div><div class="metric-value warn">${maxed.length}</div></div>
      <div class="metric"><div class="metric-label">Shadow assignments</div><div class="metric-value" style="color:var(--purple)">${totalShadowRelationships}</div></div>
    </div>

    <div style="display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap;">
      <input class="filter-input" id="inst-search" placeholder="Search instructors…" oninput="filterInstGrid()" style="min-width:200px;"/>
      <select id="inst-filter" onchange="filterInstGrid()" style="background:var(--surface);border:1px solid var(--border);border-radius:8px;color:var(--text);font-family:inherit;font-size:13px;padding:7px 12px;outline:none;">
        <option value="all">All instructors</option>
        <option value="active">Active only</option>
        <option value="open">Open to new classes</option>
        <option value="maxed">Maxed out</option>
        <option value="inactive">Inactive</option>
        <option value="shadows">Has shadow role</option>
      </select>
    </div>

    <div class="inst-grid" id="inst-grid">
      ${names.map(name => {
        const c = avatarColor(name);
        const p = INSTRUCTOR_PROFILES[name];
        const active = p?.active !== false;
        const {lead, shadow} = classesForInstructor(name);
        const totalShadows = shadow.length;
        return `<div class="inst-card${active?'':' inactive'}" onclick="openProfile('${name.replace(/'/g,"\\'")}')">
          <div class="inst-avatar" style="background:${c.bg};color:${c.txt}">${initials(name)}</div>
          <div class="inst-name">${name}</div>
          <div class="inst-sub" style="margin-bottom:6px;">${lead.length} class${lead.length!==1?'es':''}${totalShadows?` · <span style="color:#d2a8ff">${totalShadows} shadowing</span>`:''}${p?.note?` · <span title="${p.note}">📌</span>`:''}</div>
          <div>
            ${!active?'<span class="badge b-red">inactive</span>':''}
            ${active&&p?.maxNew===0?'<span class="badge b-amber">maxed out</span>':''}
            ${active&&p?.maxNew>0?`<span class="badge b-green">+${p.maxNew} new</span>`:''}
            ${p?.levelPref?`<span class="badge b-gray">${p.levelPref}</span>`:''}
          </div>
        </div>`;
      }).join('')}
    </div>
  `;
}

function filterInstGrid() {
  const q = (document.getElementById("inst-search")?.value||"").toLowerCase();
  const f = document.getElementById("inst-filter")?.value||"all";
  document.querySelectorAll(".inst-card").forEach(card => {
    const name = card.querySelector(".inst-name")?.textContent||"";
    const p = INSTRUCTOR_PROFILES[name];
    const active = p?.active !== false;
    const {shadow} = classesForInstructor(name);
    let show = true;
    if (q && !name.toLowerCase().includes(q)) show = false;
    if (f==="active" && !active) show = false;
    if (f==="inactive" && active) show = false;
    if (f==="open" && !(active && p?.maxNew > 0)) show = false;
    if (f==="maxed" && !(active && p?.maxNew === 0)) show = false;
    if (f==="shadows" && shadow.length===0) show = false;
    card.style.display = show ? "" : "none";
  });
}

function openProfile(name) {
  selectedInstructor = name;
  renderProfile(document.getElementById("tab-instructors"), name);
}

function renderProfile(el, name) {
  const c = avatarColor(name);
  const p = INSTRUCTOR_PROFILES[name] || {active:true};
  const {lead, shadow} = classesForInstructor(name);
  const allC = [...lead, ...shadow];

  el.innerHTML = `
    <button class="back-btn" onclick="selectedInstructor=null;renderInstructors();">← All instructors</button>
    <div class="profile-header">
      <div class="profile-avatar" style="background:${c.bg};color:${c.txt}">${initials(name)}</div>
      <div>
        <div class="profile-name">${name}</div>
        <div class="profile-meta">
          ${p.active===false?'<span class="badge b-red">Inactive</span>':'<span class="badge b-green">Active</span>'}
          ${p.maxNew===0?'<span class="badge b-amber">Maxed out</span>':p.maxNew?`<span class="badge b-green">Open to ${p.maxNew} new</span>`:''}
          ${p.levelPref?`<span class="badge b-gray">Pref: ${p.levelPref}</span>`:''}
          ${shadow.length?`<span class="badge b-purple">Shadowing ${shadow.length} class${shadow.length>1?'es':''}</span>`:''}
        </div>
      </div>
    </div>

    ${p.note?`<div class="section-box" style="border-color:rgba(88,166,255,.2);margin-bottom:12px;">
      <div class="section-label">Notes</div>
      <div class="note-box">${p.note}</div>
    </div>`:''}

    <div class="two-col">
      <div>
        <div class="section-box">
          <div class="section-label">Lead classes (${lead.length})</div>
          ${lead.length
            ? lead.map(cls=>`<div class="class-pill lead" style="display:flex;">
                <span style="font-weight:600;color:var(--accent)">${cls.classId||cls.className}</span>
                <span style="color:var(--muted);margin-left:6px;">${[cls.day,cls.time].filter(Boolean).join(' ')}</span>
                ${cls.delivery?`<span style="margin-left:4px;">${cls.delivery==='online'?'🌐':'🏫'}</span>`:''}
              </div>`).join('')
            : '<div class="empty">No lead classes found in current data.</div>'}
        </div>
        ${shadow.length?`<div class="section-box" style="border-color:rgba(188,140,255,.2);">
          <div class="section-label" style="color:#d2a8ff;">Shadow classes (${shadow.length})</div>
          ${shadow.map(cls=>{
            const d = getShadowData(cls.classId||cls.className, name);
            return `<div class="class-pill shadow" style="display:flex;flex-direction:column;align-items:flex-start;gap:2px;padding:8px 10px;">
              <div style="display:flex;align-items:center;gap:8px;width:100%;">
                <span style="font-weight:600;color:#d2a8ff">${cls.classId||cls.className}</span>
                <span style="color:var(--muted);font-size:11px;">${[cls.day,cls.time].filter(Boolean).join(' ')}</span>
                <span style="margin-left:auto;font-size:11px;color:#d2a8ff;">${d.sessions} session${d.sessions!==1?'s':''}</span>
                ${d.cleared?'<span class="badge b-purple">✓ cleared</span>':''}
              </div>
              ${d.notes?`<div style="font-size:11px;color:var(--muted);margin-top:2px;">${d.notes}</div>`:''}
            </div>`;
          }).join('')}
        </div>`:''}
      </div>
      <div>
        <div class="section-box">
          <div class="section-label">Schedule summary</div>
          ${allC.length?`<div style="font-size:13px;color:var(--muted);">
            ${['Mon','Tue','Wed','Thu','Fri','Sat'].map(day=>{
              const dayClasses = allC.filter(c=>(c.day||'').toLowerCase().startsWith(day.toLowerCase()));
              if (!dayClasses.length) return '';
              return `<div style="margin-bottom:6px;"><span style="color:var(--text);font-weight:600;min-width:36px;display:inline-block;">${day}</span>
                ${dayClasses.map(c=>`<span style="margin-left:4px;font-size:11px;background:var(--surface2);padding:2px 6px;border-radius:4px;">${c.time||'?'} ${c.classId||c.className}</span>`).join('')}
              </div>`;
            }).join('')}
          </div>` : '<div class="empty">No classes in current data.</div>'}
        </div>
      </div>
    </div>
  `;
}

// TAB 2 — AVAILABILITY ROLLUP
// ════════════════════════════════════════════════════════
function renderAvailability() {
  const el = document.getElementById("tab-availability");
  el.innerHTML = `
    <div class="avail-controls">
      <select id="av-day">
        <option value="">All days</option>
        ${['Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'].map(d=>`<option value="${d}">${d}</option>`).join('')}
      </select>
      <select id="av-delivery">
        <option value="">All delivery</option>
        <option value="in-person">🏫 In-person</option>
        <option value="online">🌐 Online</option>
      </select>
      <input class="filter-input" id="av-inst-search" placeholder="Filter instructor…" style="min-width:160px;"/>
      <button onclick="renderAvGrid()" style="background:var(--surface);border:1px solid var(--border);color:var(--text);padding:7px 14px;border-radius:8px;font-family:inherit;font-size:13px;cursor:pointer;">Apply</button>
    </div>
    <div id="av-grid"></div>
  `;
  // Auto-attach change listeners
  ['av-day','av-delivery'].forEach(id=>document.getElementById(id).addEventListener('change',renderAvGrid));
  document.getElementById('av-inst-search').addEventListener('input',renderAvGrid);
  renderAvGrid();
}

function renderAvGrid() {
  const day = (document.getElementById("av-day")?.value||"").toLowerCase().slice(0,3);
  const delivery = document.getElementById("av-delivery")?.value||"";
  const search = (document.getElementById("av-inst-search")?.value||"").toLowerCase();
  const el = document.getElementById("av-grid");
  if (!el) return;

  const filteredClasses = allClasses.filter(c => {
    if (day && !(c.day||"").toLowerCase().startsWith(day)) return false;
    if (delivery && c.delivery !== delivery) return false;
    return true;
  });

  // Group by day then time
  const byDayTime = {};
  filteredClasses.forEach(c => {
    const key = `${c.day||'?'} ${c.time||'?'}`;
    if (!byDayTime[key]) byDayTime[key] = {day:c.day,time:c.time,classes:[]};
    byDayTime[key].classes.push(c);
  });

  const DAY_ORDER = {mon:0,tue:1,wed:2,thu:3,fri:4,sat:5,sun:6};
  const slots = Object.values(byDayTime).sort((a,b)=>{
    const da = DAY_ORDER[(a.day||'').toLowerCase().slice(0,3)]??9;
    const db = DAY_ORDER[(b.day||'').toLowerCase().slice(0,3)]??9;
    if (da!==db) return da-db;
    const ta = (a.time||'').match(/(\d+):(\d+)/);
    const tb = (b.time||'').match(/(\d+):(\d+)/);
    const ma = ta ? parseInt(ta[1])*60+parseInt(ta[2]) : 9999;
    const mb = tb ? parseInt(tb[1])*60+parseInt(tb[2]) : 9999;
    return ma-mb;
  });

  if (!slots.length) { el.innerHTML='<div class="empty">No classes match these filters.</div>'; return; }

  el.innerHTML = `<div class="time-grid"><table class="time-table">
    <thead><tr>
      <th>Day</th><th>Time</th><th>Lead instructor</th><th>Shadow(s)</th><th>Class</th><th>Delivery</th><th>Students</th>
    </tr></thead>
    <tbody>
    ${slots.flatMap(slot=>slot.classes.map(c=>{
      const instMatch = !search || normalizeName(c.instructor||"").toLowerCase().includes(search) || (c.shadows||[]).map(s=>normalizeName(s)).some(s=>s.toLowerCase().includes(search));
      if (!instMatch) return '';
      const shadowBadges = (c.shadows||[]).map(s=>`<span class="avail-pip pip-shadow">${s}</span>`).join('');
      return `<tr>
        <td style="color:var(--text);font-weight:500;">${c.day||'—'}</td>
        <td class="time-label">${c.time||'—'}</td>
        <td>${c.instructor?`<span class="avail-pip pip-class">${c.instructor}</span>`:'<span style="color:var(--muted)">—</span>'}</td>
        <td>${shadowBadges||'<span style="color:var(--muted)">—</span>'}</td>
        <td style="color:var(--accent);font-weight:500;">${c.classId||c.className}</td>
        <td>${c.delivery?`<span class="avail-pip ${c.delivery==='online'?'pip-online':'pip-ip'}">${c.delivery==='online'?'🌐 Online':'🏫 In-person'}</span>`:'—'}</td>
        <td style="color:var(--muted);">${c.students?.length??0}</td>
      </tr>`;
    })).join('')}
    </tbody>
  </table></div>`;
}

// TAB 3 — CONFLICTS
// ════════════════════════════════════════════════════════
function renderConflicts() {
  const el = document.getElementById("tab-conflicts");
  const conflicts = detectConflicts();

  const inactive = Object.entries(INSTRUCTOR_PROFILES).filter(([,p])=>p.active===false);

  el.innerHTML = `
    <div style="margin-bottom:24px;">
      <div class="section-label" style="margin-bottom:12px;">Detected scheduling conflicts (${conflicts.length})</div>
      ${conflicts.length
        ? conflicts.map(c=>`
          <div class="conflict-card">
            <div class="conflict-title">${c.type}</div>
            <div class="conflict-detail">${c.detail}</div>
            <div style="margin-top:8px;">${c.tags.map(t=>`<span class="conflict-tag">${t}</span>`).join('')}</div>
          </div>`).join('')
        : '<div class="empty">No conflicts detected in current data.</div>'}
    </div>

    <div>
      <div class="section-label" style="margin-bottom:12px;">Inactive instructors (${inactive.length})</div>
      ${inactive.map(([name,p])=>`
        <div style="background:var(--surface);border:1px solid rgba(248,81,73,.2);border-radius:10px;padding:12px 16px;margin-bottom:8px;">
          <span style="font-weight:600;color:#ffa198;">${name}</span>
          <span style="color:var(--muted);font-size:13px;margin-left:10px;">${p.note}</span>
        </div>`).join('')}
    </div>
  `;
}

function detectConflicts() {
  const conflicts = [];

  // Same instructor assigned as both lead and shadow on same class
  allClasses.forEach(c => {
    const lead = normalizeName(c.instructor||"");
    const shadows = (c.shadows||[]).map(s=>normalizeName(s));
    if (lead && shadows.includes(lead)) {
      conflicts.push({
        type:"Lead also listed as shadow",
        detail:`${lead} is both lead and shadow on class ${c.classId||c.className} (${c.day} ${c.time}).`,
        tags:[lead, c.classId||c.className, c.day]
      });
    }
  });

  // Same time slot, same lead instructor on multiple classes
  const byInstructor = {};
  allClasses.forEach(c => {
    const lead = normalizeName(c.instructor||"");
    const key = `${lead}|${(c.day||'').toLowerCase().slice(0,3)}|${c.time}`;
    if (!lead) return;
    if (!byInstructor[key]) byInstructor[key] = [];
    byInstructor[key].push(c);
  });
  Object.entries(byInstructor).forEach(([key, classes]) => {
    if (classes.length > 1) {
      const [inst,day,time] = key.split('|');
      conflicts.push({
        type:"Double-booked lead instructor",
        detail:`${inst} is assigned as lead to ${classes.length} classes at the same time: ${classes.map(c=>c.classId||c.className).join(', ')}`,
        tags:[inst, day, time, ...classes.map(c=>c.classId||c.className)]
      });
    }
  });

  // Same time slot, same shadow on multiple classes
  const byShadow = {};
  allClasses.forEach(c => {
    (c.shadows||[]).forEach(s => {
      const name = normalizeName(s);
      const key = `${name}|${(c.day||'').toLowerCase().slice(0,3)}|${c.time}`;
      if (!byShadow[key]) byShadow[key] = [];
      byShadow[key].push(c);
    });
  });
  Object.entries(byShadow).forEach(([key, classes]) => {
    if (classes.length > 1) {
      const [inst,day,time] = key.split('|');
      conflicts.push({
        type:"Shadow instructor double-booked",
        detail:`${inst} is shadowing ${classes.length} classes at the same time: ${classes.map(c=>c.classId||c.className).join(', ')}`,
        tags:[inst, day, time]
      });
    }
  });

  // Instructors marked inactive but still assigned
  const inactiveNames = new Set(Object.entries(INSTRUCTOR_PROFILES).filter(([,p])=>p.active===false).map(([n])=>n));
  allClasses.forEach(c => {
    const lead = normalizeName(c.instructor||"");
    const affectedLead = lead && inactiveNames.has(lead) ? [lead] : [];
    const affectedShadows = (c.shadows||[]).map(s=>normalizeName(s)).filter(s=>inactiveNames.has(s));
    const affected = [...new Set([...affectedLead, ...affectedShadows])];
    if (affected.length) {
      conflicts.push({
        type:"Inactive instructor assigned to class",
        detail:`${affected.join(', ')} ${affected.length>1?'are':'is'} marked inactive but assigned to ${c.classId||c.className} (${c.day} ${c.time}).`,
        tags:[...affected, c.classId||c.className]
      });
    }
  });

  return conflicts;
}

// TAB 4 — SHADOW TRACKER
// ════════════════════════════════════════════════════════
function renderShadows() {
  const el = document.getElementById("tab-shadows");

  // Build list of all shadow relationships from current class data
  const relationships = [];
  allClasses.forEach(c => {
    (c.shadows||[]).forEach(name => {
      relationships.push({name: normalizeName(name), cls:c});
    });
  });

  if (!relationships.length) {
    el.innerHTML = `<div class="empty">No shadow instructors found in current class data.<br><br>Add a <code>Shadows</code> column to your CSV with semicolon-separated instructor names (e.g. <code>Cameron;Jordan</code>).</div>`;
    return;
  }

  // Group by instructor name
  const byName = {};
  relationships.forEach(r => {
    if (!byName[r.name]) byName[r.name] = [];
    byName[r.name].push(r.cls);
  });

  const totalCleared = relationships.filter(r => {
    const d = getShadowData(r.cls.classId||r.cls.className, r.name);
    return d.cleared;
  }).length;

  el.innerHTML = `
    <div class="metrics" style="grid-template-columns:repeat(3,1fr);">
      <div class="metric"><div class="metric-label">Shadow instructors</div><div class="metric-value" style="color:var(--purple)">${Object.keys(byName).length}</div></div>
      <div class="metric"><div class="metric-label">Shadow assignments</div><div class="metric-value">${relationships.length}</div></div>
      <div class="metric"><div class="metric-label">Cleared to lead</div><div class="metric-value ok">${totalCleared}</div></div>
    </div>

    ${Object.entries(byName).sort(([a],[b])=>a.localeCompare(b)).map(([name,classes])=>{
      const c = avatarColor(name);
      return `<div style="margin-bottom:20px;">
        <div style="display:flex;align-items:center;gap:10px;margin-bottom:10px;">
          <div style="width:32px;height:32px;border-radius:50%;background:${c.bg};color:${c.txt};display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;">${initials(name)}</div>
          <div style="font-family:'Fraunces',serif;font-size:18px;font-weight:700;color:#d2a8ff;">${name}</div>
          <div style="font-size:12px;color:var(--muted);">${classes.length} class${classes.length!==1?'es':''}</div>
        </div>
        ${classes.map(cls=>{
          const cid = (cls.classId||cls.className).replace(/[^a-z0-9]/gi,'_');
          const d = getShadowData(cls.classId||cls.className, name);
          const safeName = name.replace(/\s+/g,'_');
          return `<div class="shadow-tracker-card" id="stc-${cid}-${safeName}">
            <div class="shadow-tracker-header">
              <div>
                <div class="shadow-tracker-name">${cls.classId||cls.className}</div>
                <div class="shadow-tracker-class">${[cls.day,cls.time,cls.instructor?`Lead: ${cls.instructor}`:''].filter(Boolean).join(' · ')}</div>
              </div>
              <div class="shadow-counter">
                <button class="sc-btn" onclick="stAdjust('${cid}','${name}','${safeName}',-1)">−</button>
                <div>
                  <div class="sc-val" id="stval-${cid}-${safeName}">${d.sessions}</div>
                  <div class="sc-label" style="text-align:center;">sessions</div>
                </div>
                <button class="sc-btn" onclick="stAdjust('${cid}','${name}','${safeName}',1)">+</button>
              </div>
            </div>
            <textarea class="shadow-notes" rows="2" placeholder="Notes for ${name} on this class…"
              onchange="stSaveNotes('${cid}','${name}')" oninput="stSaveNotes('${cid}','${name}')"
              id="stnotes-${cid}-${safeName}">${d.notes}</textarea>
            <label class="cleared-label${d.cleared?' is-cleared':''}" id="stcleared-${cid}-${safeName}">
              <input type="checkbox" ${d.cleared?'checked':''} onchange="stToggleCleared('${cid}','${name}','${safeName}',this)"/>
              Cleared to lead independently
            </label>
          </div>`;
        }).join('')}
      </div>`;
    }).join('')}
  `;
}

function stAdjust(cid, name, safeName, delta) {
  const d = getShadowData(cid, name);
  d.sessions = Math.max(0, d.sessions + delta);
  saveShadowData(cid, name, d);
  const el = document.getElementById(`stval-${cid}-${safeName}`);
  if (el) el.textContent = d.sessions;
}
function stSaveNotes(cid, name) {
  const safeName = name.replace(/\s+/g,'_');
  const el = document.getElementById(`stnotes-${cid}-${safeName}`);
  if (!el) return;
  const d = getShadowData(cid, name);
  d.notes = el.value;
  saveShadowData(cid, name, d);
}
function stToggleCleared(cid, name, safeName, checkbox) {
  const d = getShadowData(cid, name);
  d.cleared = checkbox.checked;
  saveShadowData(cid, name, d);
  const label = document.getElementById(`stcleared-${cid}-${safeName}`);
  if (label) label.classList.toggle('is-cleared', d.cleared);
  // Re-render metrics
  const totalCleared = document.querySelectorAll('.cleared-label.is-cleared').length;
  const metric = document.querySelectorAll('.metric-value')[2];
  if (metric) metric.textContent = totalCleared;
}
