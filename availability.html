<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Instructor Availability — Bright Minds</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Fraunces:wght@700;900&family=Inter:wght@400;500;600&display=swap');
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{
  --bg:#05080f;--surface:#0d1117;--surface2:#111720;
  --border:#1c2333;--text:#e6edf3;--muted:#768390;
  --accent:#58a6ff;--green:#3fb950;--amber:#d29922;--red:#f85149;--purple:#bc8cff;
}
body{background:var(--bg);color:var(--text);font-family:'Inter',sans-serif;font-size:14px;min-height:100vh;}
header{display:flex;align-items:center;justify-content:space-between;padding:16px 32px;border-bottom:1px solid var(--border);flex-wrap:wrap;gap:10px;}
.logo{font-family:'Fraunces',serif;font-size:20px;font-weight:900;}
.nav-link{background:transparent;border:1px solid var(--border);color:var(--muted);padding:7px 14px;border-radius:8px;font-family:inherit;font-size:12px;font-weight:600;cursor:pointer;text-decoration:none;display:inline-flex;align-items:center;gap:5px;transition:all .15s;}
.nav-link:hover{border-color:var(--accent);color:var(--accent);}
main{max-width:1100px;margin:0 auto;padding:24px 20px 80px;}
.tabs{display:flex;border-bottom:1px solid var(--border);margin-bottom:24px;overflow-x:auto;}
.tab{padding:10px 20px;font-size:13px;font-weight:600;cursor:pointer;color:var(--muted);border-bottom:2px solid transparent;white-space:nowrap;background:none;border-top:none;border-left:none;border-right:none;font-family:inherit;transition:color .15s;}
.tab:hover{color:var(--text);}
.tab.active{color:var(--accent);border-bottom-color:var(--accent);}
.card{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:20px;margin-bottom:16px;}
.section-label{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.09em;color:var(--muted);margin-bottom:10px;}
.metrics{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:20px;}
.metric{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:14px;}
.metric-label{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;margin-bottom:4px;}
.metric-value{font-size:24px;font-weight:700;font-family:'Fraunces',serif;}
.ok{color:var(--green);}.warn{color:var(--amber);}.crit{color:var(--red);}.purple{color:var(--purple);}
.inst-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(190px,1fr));gap:10px;}
.inst-card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:14px;cursor:pointer;transition:border-color .15s;}
.inst-card:hover{border-color:var(--accent);}
.inst-card.inactive{opacity:.4;}
.inst-avatar{width:38px;height:38px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;margin-bottom:8px;}
.inst-name{font-weight:600;font-size:14px;margin-bottom:3px;}
.inst-sub{font-size:11px;color:var(--muted);}
.badge{display:inline-block;padding:2px 7px;border-radius:6px;font-size:10px;font-weight:600;margin:1px;}
.b-green{background:rgba(63,185,80,.15);color:#3fb950;}
.b-red{background:rgba(248,81,73,.12);color:#ffa198;}
.b-amber{background:rgba(210,153,34,.12);color:#e3b341;}
.b-purple{background:rgba(188,140,255,.15);color:#d2a8ff;}
.b-blue{background:rgba(88,166,255,.1);color:#79c0ff;}
.b-gray{background:rgba(118,131,144,.15);color:#adbac7;}
.back-btn{background:transparent;border:none;color:var(--muted);font-size:13px;cursor:pointer;padding:0;margin-bottom:16px;font-family:inherit;display:flex;align-items:center;gap:5px;}
.back-btn:hover{color:var(--text);}
.profile-header{display:flex;align-items:center;gap:16px;margin-bottom:20px;padding:20px;background:var(--surface);border:1px solid var(--border);border-radius:14px;}
.profile-avatar{width:52px;height:52px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:700;flex-shrink:0;}
.profile-name{font-family:'Fraunces',serif;font-size:20px;font-weight:900;}
.two-col{display:grid;grid-template-columns:1fr 1fr;gap:16px;}
@media(max-width:700px){.two-col{grid-template-columns:1fr;}.metrics{grid-template-columns:1fr 1fr;}}
.note-box{background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:10px 14px;font-size:13px;color:var(--muted);line-height:1.6;}
/* Availability grid */
.avail-grid{display:grid;grid-template-columns:80px repeat(6,1fr);gap:2px;font-size:13px;margin-top:8px;}
.ag-header{font-size:13px;font-weight:700;text-align:center;color:var(--text);padding:6px 4px;}
.ag-label{font-size:12px;color:var(--muted);display:flex;align-items:center;padding:2px 4px;white-space:nowrap;}
.ag-cell{border-radius:5px;padding:5px 4px;text-align:center;cursor:pointer;transition:all .1s;border:1px solid transparent;font-size:11px;font-weight:700;user-select:none;min-height:26px;display:flex;align-items:center;justify-content:center;}
.ag-cell.none{background:var(--surface2);color:#333a42;}
.ag-cell.none:hover{border-color:var(--border);color:var(--muted);}
.ag-cell.ip{background:rgba(63,185,80,.22);color:#56d364;border-color:rgba(63,185,80,.35);}
.ag-cell.online{background:rgba(88,166,255,.22);color:#79c0ff;border-color:rgba(88,166,255,.35);}
.ag-cell.both{background:rgba(188,140,255,.22);color:#d2a8ff;border-color:rgba(188,140,255,.35);}
.ag-cell.readonly{cursor:default;}
.ag-cell.drag-preview{opacity:.6;transform:scale(.97);}
.ag-day-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:4px;}
.ag-day-btn{background:transparent;border:1px solid var(--border);border-radius:5px;color:var(--muted);font-family:inherit;font-size:10px;font-weight:600;padding:2px 6px;cursor:pointer;white-space:nowrap;}
.ag-day-btn:hover{border-color:var(--accent);color:var(--accent);}
.avail-legend{display:flex;gap:14px;flex-wrap:wrap;margin-top:12px;font-size:12px;color:var(--muted);}
.legend-dot{display:inline-block;width:10px;height:10px;border-radius:2px;margin-right:4px;vertical-align:middle;}
.drag-mode-bar{display:flex;gap:6px;align-items:center;margin-bottom:12px;padding:10px 14px;background:var(--surface2);border-radius:8px;border:1px solid var(--border);flex-wrap:wrap;}
.drag-mode-bar span{font-size:11px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;}
.drag-mode-btn{padding:6px 14px;border-radius:6px;border:1px solid var(--border);background:transparent;font-family:inherit;font-size:12px;font-weight:600;cursor:pointer;color:var(--muted);transition:all .12s;}
.drag-mode-btn:hover{border-color:var(--muted);color:var(--text);}
.drag-mode-btn.active-ip{background:rgba(63,185,80,.22);border-color:rgba(63,185,80,.5);color:#56d364;}
.drag-mode-btn.active-online{background:rgba(88,166,255,.22);border-color:rgba(88,166,255,.5);color:#79c0ff;}
.drag-mode-btn.active-both{background:rgba(188,140,255,.22);border-color:rgba(188,140,255,.5);color:#d2a8ff;}
.drag-mode-btn.active-none{background:rgba(118,131,144,.15);border-color:rgba(118,131,144,.4);color:#adbac7;}
.ag-cell.drag-over{filter:brightness(1.4);transform:scale(1.05);}
.btn{padding:9px 18px;border-radius:8px;border:none;font-family:inherit;font-size:13px;font-weight:600;cursor:pointer;transition:opacity .15s;}
.btn:hover{opacity:.85;}.btn:disabled{opacity:.4;cursor:not-allowed;}
.btn-primary{background:var(--accent);color:#05080f;}
.btn-ghost{background:transparent;border:1px solid var(--border);color:var(--muted);}
.btn-ghost:hover{border-color:var(--muted);color:var(--text);opacity:1;}
.save-status{font-size:12px;color:var(--muted);}
.save-status.saved{color:var(--green);}
.rollup-table{width:100%;border-collapse:collapse;font-size:12px;}
.rollup-table th{padding:7px 10px;text-align:left;font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.06em;color:var(--muted);border-bottom:1px solid var(--border);}
.rollup-table td{padding:6px 10px;border-bottom:1px solid #0a0f18;vertical-align:middle;}
.rollup-table tr:hover td{background:rgba(255,255,255,.015);}
.pip{display:inline-block;padding:2px 6px;border-radius:4px;font-size:10px;font-weight:600;margin:1px;}
.pip-ip{background:rgba(63,185,80,.15);color:#56d364;}
.pip-online{background:rgba(88,166,255,.1);color:#79c0ff;}
.pip-both{background:rgba(188,140,255,.12);color:#d2a8ff;}
.pip-shadow{background:rgba(188,140,255,.12);color:#d2a8ff;}
.pip-class{background:rgba(210,153,34,.12);color:#e3b341;}
.conflict-card{background:var(--surface);border:1px solid rgba(248,81,73,.3);border-radius:12px;padding:14px 18px;margin-bottom:10px;}
.conflict-title{font-weight:600;color:#ffa198;margin-bottom:4px;font-size:14px;}
.conflict-detail{font-size:13px;color:var(--muted);line-height:1.6;}
.conflict-tag{background:rgba(248,81,73,.12);color:#ffa198;border-radius:6px;padding:2px 8px;font-size:11px;font-weight:600;display:inline-block;margin:2px;}
.shadow-tracker-card{background:var(--surface);border:1px solid rgba(188,140,255,.2);border-radius:12px;padding:16px;margin-bottom:10px;}
.sc-btn{background:var(--surface2);border:1px solid var(--border);color:var(--text);width:26px;height:26px;border-radius:6px;cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center;font-family:inherit;}
.sc-btn:hover{border-color:var(--purple);}
.sc-val{font-family:'Fraunces',serif;font-size:22px;font-weight:900;color:#d2a8ff;min-width:32px;text-align:center;}
.shadow-notes{background:var(--surface2);border:1px solid var(--border);border-radius:8px;color:var(--text);font-family:inherit;font-size:13px;padding:8px 12px;resize:none;width:100%;outline:none;margin-top:10px;line-height:1.6;}
.shadow-notes:focus{border-color:var(--purple);}
.cleared-label{display:flex;align-items:center;gap:6px;font-size:12px;color:var(--muted);margin-top:10px;cursor:pointer;}
.cleared-label input{accent-color:var(--purple);cursor:pointer;}
.cleared-label.is-cleared{color:#d2a8ff;font-weight:600;}
.filter-row{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:16px;align-items:center;}
.filter-row select,.filter-row input{background:var(--surface);border:1px solid var(--border);border-radius:8px;color:var(--text);font-family:inherit;font-size:12px;padding:7px 10px;outline:none;}
.filter-row select:focus,.filter-row input:focus{border-color:var(--accent);}
.empty{color:var(--muted);font-size:13px;padding:28px;text-align:center;}
.spinner-wrap{text-align:center;padding:60px;color:var(--muted);}
.dot-spin{display:inline-block;animation:spin .9s linear infinite;}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>
<header>
  <div class="logo">Bright Minds — Availability</div>
  <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap;">
    <span id="user-label" style="font-size:12px;color:var(--muted);"></span>
    <a href="index.html" class="nav-link">ClassCluster</a>
    <a id="admin-link" href="admin.html" class="nav-link" style="display:none;">Admin</a>
    <button onclick="doSignOut()" class="nav-link">Sign out</button>
  </div>
</header>
<main>
  <div class="spinner-wrap" id="spinner"><span class="dot-spin">⟳</span>&nbsp;Loading…</div>
  <div id="app" style="display:none;">
    <div class="tabs">
      <button class="tab active" onclick="showTab('my-availability',this)">My availability</button>
      <button class="tab" onclick="showTab('instructors',this)">All instructors</button>
      <button class="tab" onclick="showTab('rollup',this)">Rollup</button>
      <button class="tab" onclick="showTab('conflicts',this)">Conflicts</button>
      <button class="tab" onclick="showTab('shadows',this)">Shadow tracker</button>
    </div>
    <div id="tab-my-availability"></div>
    <div id="tab-instructors" style="display:none;"></div>
    <div id="tab-rollup" style="display:none;"></div>
    <div id="tab-conflicts" style="display:none;"></div>
    <div id="tab-shadows" style="display:none;"></div>
  </div>
</main>
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getAuth, onAuthStateChanged, signOut as fbSignOut } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import { getFirestore, collection, doc, getDoc, getDocs, updateDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
import { firebaseConfig, CLASS_DATA_URL } from "./firebase-config.js";

const app  = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db   = getFirestore(app);

const DAYS  = ['Mon','Tue','Wed','Thu','Fri','Sat'];

// Per-day slot ranges
const DAY_RANGE = {
  Mon: {start:[15,0], end:[21,0]},
  Tue: {start:[15,0], end:[21,0]},
  Wed: {start:[15,0], end:[21,0]},
  Thu: {start:[15,0], end:[21,0]},
  Fri: {start:[13,0], end:[21,0]},
  Sat: {start:[8,45], end:[16,0]},
};
function slotsForDay(day) {
  const {start,end} = DAY_RANGE[day] || {start:[15,0],end:[21,0]};
  const slots = [];
  for (let h=start[0]; h<=end[0]; h++) {
    for (let m=0; m<60; m+=15) {
      if (h===start[0] && m<start[1]) continue;
      if (h===end[0]   && m>=end[1])  continue;
      if (h>end[0]) continue;
      slots.push(`${h}:${m.toString().padStart(2,'0')}`);
    }
  }
  return slots;
}
// Union of all slots (for rollup/conflict selectors)
const SLOTS = [...new Set(DAYS.flatMap(slotsForDay))].sort((a,b)=>{
  const [ah,am]=a.split(':').map(Number),[bh,bm]=b.split(':').map(Number);
  return (ah*60+am)-(bh*60+bm);
});
// ── BOOK LEVELS (ordered by numeric value) ──
// Derived from the ClassCluster CSV at runtime; this is the fallback order.
const BOOK_LEVEL_MAP = [
  {name:'KJr',        min:-1,   max:-0.5},
  {name:'KSr',        min:-0.5, max:0},
  {name:'1A Mammoth', min:0,    max:0.5},
  {name:'1A Renert',  min:0.5,  max:1},
  {name:'1B Mammoth', min:1,    max:1.5},
  {name:'1B Renert',  min:1.5,  max:2},
  {name:'2A',         min:2,    max:2.5},
  {name:'2B',         min:2.5,  max:3},
  {name:'2C',         min:3,    max:3.5},
  {name:'2D',         min:3.5,  max:4},
  {name:'3A',         min:4,    max:4.5},
  {name:'3B',         min:4.5,  max:5},
  {name:'3C',         min:5,    max:5.5},
  {name:'3D',         min:5.5,  max:6},
  {name:'4A',         min:6,    max:7},
  {name:'4B',         min:7,    max:8},
  {name:'Book 5',     min:8,    max:9},
  {name:'Book 6',     min:9,    max:10},
  {name:'Book 7',     min:10,   max:11},
  {name:'Book 8',     min:11,   max:12},
  {name:'D1',         min:11.5, max:12},
  {name:'D2',         min:12,   max:12.25},
  {name:'M10',        min:12.25,max:14},
  {name:'M20',        min:14,   max:16},
  {name:'M30',        min:16,   max:18},
  {name:'M31',        min:18,   max:20},
];
// Derive sorted unique book names from live CSV data
let bookLevels = BOOK_LEVEL_MAP.map(b=>b.name); // updated after CSV loads

function numericToBookName(val){
  for(const b of BOOK_LEVEL_MAP){ if(val>=b.min && val<b.max) return b.name; }
  return null;
}
function updateBookLevelsFromClasses(classes){
  const seen=new Set();
  classes.forEach(c=>c.students.forEach(s=>{
    const name=numericToBookName(s.ability);
    if(name) seen.add(name);
  }));
  // Keep fallback order, filter to those seen in data (or all if none found)
  const filtered=BOOK_LEVEL_MAP.map(b=>b.name).filter(n=>seen.has(n));
  bookLevels = filtered.length>=2 ? filtered : BOOK_LEVEL_MAP.map(b=>b.name);
}

const GRADES = ['JK','SK','Grade 1','Grade 2','Grade 3','Grade 4','Grade 5',
                'Grade 6','Grade 7','Grade 8','Grade 9','Grade 10','Grade 11','Grade 12'];

const STATES = ['none','ip','online','both'];
const LABELS = {none:'—',ip:'IP',online:'Web',both:'Both'};
const TITLES = {none:'Unavailable',ip:'In-person only',online:'Online only',both:'Both IP & online'};

let currentUser=null, currentProfile=null, allProfiles=[], allClasses=[];
let draftAvail={}, draftDayNotes={}, activeTab='my-availability', selectedInst=null, unsaved=false;

const AVG=[
  {bg:"rgba(88,166,255,.15)",txt:"#79c0ff"},{bg:"rgba(63,185,80,.15)",txt:"#56d364"},
  {bg:"rgba(188,140,255,.15)",txt:"#d2a8ff"},{bg:"rgba(210,153,34,.15)",txt:"#e3b341"},
  {bg:"rgba(248,81,73,.12)",txt:"#ffa198"},{bg:"rgba(240,165,0,.12)",txt:"#f0c040"},
  {bg:"rgba(118,131,144,.15)",txt:"#adbac7"},
];
const ac=n=>AVG[(n||" ").charCodeAt(0)%AVG.length];
const ini=n=>(n||"?").split(" ").map(w=>w[0]).join("").slice(0,2).toUpperCase();
const clone=o=>JSON.parse(JSON.stringify(o||{}));

onAuthStateChanged(auth, async user=>{
  if (!user){window.location.href="login.html";return;}
  currentUser=user;
  const [ps,all]=await Promise.all([getDoc(doc(db,"instructors",user.uid)),getDocs(collection(db,"instructors"))]);
  if (!ps.exists()){
    document.getElementById("spinner").innerHTML='<p style="color:var(--red)">No profile found. Contact an administrator.</p>';
    return;
  }
  currentProfile={uid:user.uid,...ps.data()};
  allProfiles=all.docs.map(d=>({uid:d.id,...d.data()})).sort((a,b)=>(a.displayName||"").localeCompare(b.displayName||""));
  draftAvail=clone(currentProfile.availability||{});
  draftDayNotes=clone(currentProfile.dayNotes||{});
  document.getElementById("user-label").textContent=currentProfile.displayName;
  if (currentProfile.role==="admin") document.getElementById("admin-link").style.display="";
  allClasses=await fetchClasses();
  updateBookLevelsFromClasses(allClasses);
  // Debug helpers — accessible from browser console
  window._debug = { allClasses, allProfiles, classesForProfile, assignedSlotsForProfile, matchProfile };
  document.getElementById("spinner").style.display="none";
  document.getElementById("app").style.display="";
  renderTab("my-availability");
});

async function fetchClasses(){
  try{
    const r=await fetch("https://corsproxy.io/?"+encodeURIComponent(CLASS_DATA_URL),{cache:"no-cache"});
    return r.ok?parseCSV(await r.text()):[];
  }catch{return [];}
}

function parseCSV(text){
  const lines=text.trim().split(/\r?\n/);
  const hdr=lines[0].split(",").map(h=>h.trim().toLowerCase());
  const ci=hdr.indexOf("classid")>=0?hdr.indexOf("classid"):hdr.indexOf("class");
  const di=hdr.indexOf("day"),ti=hdr.indexOf("time"),ii=hdr.indexOf("instructor");
  const shi=hdr.indexOf("shadows"),deli=hdr.indexOf("delivery"),oi=hdr.indexOf("comment");
  if (ci<0) return [];
  const map={},meta={};
  for (let i=1;i<lines.length;i++){
    const c=lines[i].split(",").map(v=>v.trim());
    if (c.length<2||!c[ci]) continue;
    const cn=c[ci];
    if (!map[cn]){map[cn]=[];meta[cn]={classId:cn,
      day:di>=0?c[di]:"",time:ti>=0?c[ti]:"",instructor:ii>=0?c[ii]:"",
      shadows:shi>=0?c[shi].split(";").map(s=>s.trim()).filter(Boolean):[],
      delivery:deli>=0?(c[deli].toLowerCase().includes("online")?"online":"in-person"):"",
      comment:oi>=0?c[oi]:""};
    }
    const ni=hdr.indexOf("name"),gi=hdr.indexOf("grade"),bi=hdr.indexOf("ability")>=0?hdr.indexOf("ability"):hdr.indexOf("level");
    if (ni>=0&&gi>=0&&bi>=0&&c[ni]) map[cn].push({name:c[ni],grade:parseFloat(c[gi])||0,ability:parseFloat(c[bi])||0});
  }
  return Object.entries(map).map(([cn,students])=>({...meta[cn],className:cn,students}));
}

// Match CSV name → Firestore profile by UID (not string-matching)
function matchProfile(csvName){
  if (!csvName) return null;
  const t=csvName.trim();
  let p=allProfiles.find(x=>x.displayName===t);
  if (p) return p;
  const first=t.split(" ")[0].toLowerCase();
  return allProfiles.find(x=>(x.displayName||"").split(" ")[0].toLowerCase()===first)||null;
}

function classesForProfile(profile){
  const lead=allClasses.filter(c=>matchProfile(c.instructor)?.uid===profile.uid);
  const shadow=allClasses.filter(c=>c.shadows.some(s=>matchProfile(s)?.uid===profile.uid));
  return {lead,shadow};
}

window.showTab=function(tab,btn){
  if (unsaved&&tab!=='my-availability'){if(!confirm("Unsaved availability changes. Leave anyway?"))return;unsaved=false;}
  activeTab=tab;selectedInst=null;
  document.querySelectorAll(".tab").forEach(t=>t.classList.remove("active"));
  if(btn) btn.classList.add("active");
  ["my-availability","instructors","rollup","conflicts","shadows"].forEach(t=>{
    document.getElementById("tab-"+t).style.display=t===tab?"":"none";
  });
  renderTab(tab);
};

function renderTab(t){
  if(t==="my-availability") renderMine();
  else if(t==="instructors") renderInstructors();
  else if(t==="rollup") renderRollup();
  else if(t==="conflicts") renderConflicts();
  else if(t==="shadows") renderShadows();
}

// ── MY AVAILABILITY ──
function renderMine(){

function buildGrid(wrapperId,avail,editable){
  const w=document.getElementById(wrapperId); if(!w) return;
  let h='';

  // Drag-mode toolbar (editable only)
  if(editable){
    h+=`<div class="drag-mode-bar">
      <span>Draw mode:</span>
      <button class="drag-mode-btn active-ip" id="dm-ip"   onclick="setDragMode('ip')"    >IP</button>
      <button class="drag-mode-btn"           id="dm-online" onclick="setDragMode('online')">Online</button>
      <button class="drag-mode-btn"           id="dm-both"   onclick="setDragMode('both')"  >Both</button>
      <button class="drag-mode-btn"           id="dm-none"   onclick="setDragMode('none')"  >Clear</button>
      <span style="color:var(--border);margin:0 4px;">|</span>
      <span style="font-size:11px;color:var(--muted);font-weight:400;text-transform:none;letter-spacing:0;">Click a cell or click &amp; drag to fill a range</span>
    </div>`;
  }

  // Per-day columns
  h+=`<div style="display:flex;gap:12px;overflow-x:auto;padding-bottom:4px;" id="${wrapperId}-cols">`;
  DAYS.forEach(day=>{
    const slots=slotsForDay(day);
    h+=`<div style="flex-shrink:0;min-width:90px;">`;
    h+=`<div class="ag-header">${day}</div>`;
    slots.forEach(slot=>{
      const st=(avail[day]||{})[slot]||'none';
      const timeLabel=`<span style="font-size:12px;color:var(--muted);min-width:42px;display:inline-block;">${slot}</span>`;
      if(editable)
        h+=`<div style="display:flex;align-items:center;gap:5px;margin-bottom:3px;">${timeLabel}<div class="ag-cell ${st}" style="width:52px;" title="${TITLES[st]}" data-day="${day}" data-slot="${slot}">${st==='none'?'':LABELS[st]}</div></div>`;
      else
        h+=`<div style="display:flex;align-items:center;gap:5px;margin-bottom:3px;">${timeLabel}<div class="ag-cell ${st} readonly" style="width:52px;" title="${TITLES[st]}">${st==='none'?'':LABELS[st]}</div></div>`;
    });
    if(editable){
      const dayNote=(typeof draftDayNotes!=='undefined'?draftDayNotes[day]:'') || '';
      h+=`<textarea id="daynote-${day}" rows="2" placeholder="${day} notes…" style="margin-top:8px;width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:6px;color:var(--text);font-family:inherit;font-size:11px;padding:5px 7px;resize:none;outline:none;">${dayNote}</textarea>`;
    } else {
      const dayNote=(avail['_dayNotes']||{})[day]||'';
      if(dayNote) h+=`<div style="margin-top:6px;font-size:11px;color:var(--muted);font-style:italic;">${dayNote}</div>`;
    }
    h+=`</div>`;
  });
  h+=`</div>`;
  w.innerHTML=h;
  if(editable) attachDragHandlers(wrapperId);
}

// ── DRAG SELECTION ──
let dragMode='ip';   // current draw mode
let isDragging=false;

window.setDragMode=function(mode){
  dragMode=mode;
  ['ip','online','both','none'].forEach(m=>{
    const btn=document.getElementById('dm-'+m);
    if(!btn) return;
    btn.className='drag-mode-btn'+(mode===m?' active-'+m:'');
  });
};

function applyCell(el){
  if(!el||!el.dataset.day) return;
  const day=el.dataset.day, slot=el.dataset.slot;
  if(!draftAvail[day]) draftAvail[day]={};
  draftAvail[day][slot]=dragMode;
  el.className=`ag-cell ${dragMode}`;
  el.title=TITLES[dragMode];
  el.textContent=dragMode==='none'?'':LABELS[dragMode];
  unsaved=true; setSS('');
}

function attachDragHandlers(wrapperId){
  const cols=document.getElementById(wrapperId+'-cols');
  if(!cols) return;

  cols.addEventListener('mousedown', e=>{
    const cell=e.target.closest('.ag-cell:not(.readonly)');
    if(!cell) return;
    e.preventDefault();
    isDragging=true;
    applyCell(cell);
  });

  cols.addEventListener('mouseover', e=>{
    if(!isDragging) return;
    const cell=e.target.closest('.ag-cell:not(.readonly)');
    if(cell) applyCell(cell);
  });

  // End drag on mouseup anywhere
  document.addEventListener('mouseup', ()=>{ isDragging=false; }, {once:false});

  // Touch support
  cols.addEventListener('touchstart', e=>{
    const cell=e.target.closest('.ag-cell:not(.readonly)');
    if(!cell) return;
    isDragging=true;
    applyCell(cell);
  }, {passive:true});

  cols.addEventListener('touchmove', e=>{
    if(!isDragging) return;
    const touch=e.touches[0];
    const el=document.elementFromPoint(touch.clientX, touch.clientY);
    const cell=el?.closest('.ag-cell:not(.readonly)');
    if(cell) applyCell(cell);
  }, {passive:true});

  cols.addEventListener('touchend', ()=>{ isDragging=false; }, {passive:true});
}

// Keep cycleSlot for read-only profile view (not used in editable grid anymore)
window.cycleSlot=function(day,slot,el){
  const cur=(draftAvail[day]||{})[slot]||'none';
  const nxt=STATES[(STATES.indexOf(cur)+1)%STATES.length];
  if(!draftAvail[day]) draftAvail[day]={};
  draftAvail[day][slot]=nxt;
  el.className=`ag-cell ${nxt}`; el.title=TITLES[nxt]; el.textContent=nxt==='none'?'':LABELS[nxt];
  unsaved=true; setSS('');
};

window.resetDraft=function(){draftAvail=clone(currentProfile.availability||{});draftDayNotes=clone(currentProfile.dayNotes||{});unsaved=false;renderMine();setSS("Reset to last saved.");};
window.saveAvail=async function(){
  const btn=document.getElementById("save-btn"); btn.disabled=true; btn.textContent="Saving…";
  // Collect per-day notes from textareas
  DAYS.forEach(day=>{
    const ta=document.getElementById('daynote-'+day);
    if(ta) draftDayNotes[day]=ta.value;
  });
  // Collect preference fields
  const gradeMin  = document.getElementById('pref-grade-min')?.value  || '';
  const gradeMax  = document.getElementById('pref-grade-max')?.value  || '';
  const levelMin  = document.getElementById('pref-level-min')?.value  || '';
  const levelMax  = document.getElementById('pref-level-max')?.value  || '';
  const comment   = document.getElementById('pref-comment')?.value    || '';
  try{
    await updateDoc(doc(db,"instructors",currentUser.uid),{
      availability: draftAvail,
      dayNotes:     draftDayNotes,
      gradeMin, gradeMax, levelMin, levelMax, comment,
      availabilityUpdatedAt: serverTimestamp(),
    });
    currentProfile.availability=clone(draftAvail);
    currentProfile.dayNotes=clone(draftDayNotes);
    currentProfile.gradeMin=gradeMin; currentProfile.gradeMax=gradeMax;
    currentProfile.levelMin=levelMin; currentProfile.levelMax=levelMax;
    currentProfile.comment=comment;
    unsaved=false; setSS("✓ Saved",true);
  }catch(e){setSS("Error: "+e.message);}
  finally{btn.disabled=false;btn.textContent="Save";}
};
function setSS(msg,ok){const e=document.getElementById("save-status");if(!e)return;e.textContent=msg;e.className="save-status"+(ok?" saved":"");}

// ── ROLLUP ──

// Returns a Set of "day|slot" strings that an instructor is assigned to (lead or shadow)
// A 60-min class blocks 4 x 15-min slots starting from the class time.
function assignedSlotsForProfile(profile) {
  const blocked = new Set();
  const {lead, shadow} = classesForProfile(profile);
  [...lead, ...shadow].forEach(cls => {
    const day = DAYS.find(d => (cls.day||'').toLowerCase().startsWith(d.toLowerCase()));
    if (!day || !cls.time) return;
    // Parse class start time
    const m = cls.time.match(/(\d+):(\d+)/);
    if (!m) return;
    let mins = parseInt(m[1])*60 + parseInt(m[2]);
    // Block 4 slots (60 min at 15-min granularity)
    for (let i=0; i<4; i++) {
      const h = Math.floor(mins/60);
      const mn = mins%60;
      const key = `${day}|${h}:${mn.toString().padStart(2,'0')}`;
      blocked.add(key);
      mins += 15;
    }
  });
  return blocked;
}

function slotStatus(profile, day, slot, blockedCache) {
  // Returns: 'none' | 'ip' | 'online' | 'both' | 'assigned-lead' | 'assigned-shadow'
  const key = `${day}|${slot}`;
  if (!blockedCache) blockedCache = assignedSlotsForProfile(profile);
  if (blockedCache.has(key)) {
    // Determine lead vs shadow
    const {lead, shadow} = classesForProfile(profile);
    const isLead = lead.some(cls => {
      const d = DAYS.find(d=>(cls.day||'').toLowerCase().startsWith(d.toLowerCase()));
      return d===day && assignedSlotsForClass(cls).has(key);
    });
    return isLead ? 'assigned-lead' : 'assigned-shadow';
  }
  return (profile.availability?.[day]||{})[slot]||'none';
}

function assignedSlotsForClass(cls) {
  const blocked = new Set();
  const day = DAYS.find(d=>(cls.day||'').toLowerCase().startsWith(d.toLowerCase()));
  if (!day||!cls.time) return blocked;
  const m = cls.time.match(/(\d+):(\d+)/);
  if (!m) return blocked;
  let mins = parseInt(m[1])*60+parseInt(m[2]);
  for (let i=0;i<4;i++){
    const h=Math.floor(mins/60), mn=mins%60;
    blocked.add(`${day}|${h}:${mn.toString().padStart(2,'0')}`);
    mins+=15;
  }
  return blocked;
}

      <span><span style="display:inline-block;width:10px;height:10px;border-radius:2px;background:rgba(88,166,255,.3);margin-right:4px;vertical-align:middle;"></span>Online free</span>
      <span><span style="display:inline-block;width:10px;height:10px;border-radius:2px;background:rgba(188,140,255,.3);margin-right:4px;vertical-align:middle;"></span>Both free</span>
      <span><span style="display:inline-block;width:10px;height:10px;border-radius:2px;background:rgba(210,153,34,.3);margin-right:4px;vertical-align:middle;"></span>Assigned (lead)</span>
      <span><span style="display:inline-block;width:10px;height:10px;border-radius:2px;background:rgba(188,140,255,.15);border:1px solid rgba(188,140,255,.3);margin-right:4px;vertical-align:middle;"></span>Assigned (shadow)</span>
    </div>
    <div id="rollup-wrap"></div>`;

  document.getElementById("rd").addEventListener("change", function(){
    const day=this.value;
    const slots=day?slotsForDay(day):SLOTS;
    const rs=document.getElementById("rs");
    rs.innerHTML='<option value="">Any time</option>'+slots.map(s=>`<option value="${s}">${s}</option>`).join('');
    buildRollup();
  });
  ["rm","rs","rf"].forEach(id=>document.getElementById(id).addEventListener("change",buildRollup));
  buildRollup();
}

window.buildRollup=function(){
  const day  = document.getElementById("rd")?.value||"";
  const mode = document.getElementById("rm")?.value||"";
  const slot = document.getElementById("rs")?.value||"";
  const filt = document.getElementById("rf")?.value||"free";
  const q    = (document.getElementById("rq")?.value||"").toLowerCase();
  const wrap = document.getElementById("rollup-wrap"); if(!wrap) return;
  const days=day?[day]:DAYS, slots=slot?[slot]:SLOTS;

  // Pre-compute blocked slots per instructor
  const blockedByUid={};
  allProfiles.forEach(p=>{ blockedByUid[p.uid]=assignedSlotsForProfile(p); });

  // Helper: does a slot pass the delivery mode filter?
  function slotMatchesMode(avail, isAssigned, assignedDelivery, mode){
    if(!mode) return true;
    if(!isAssigned){
      if(mode==="ip"     ) return avail==="ip"||avail==="both";
      if(mode==="online" ) return avail==="online"||avail==="both";
      if(mode==="both"   ) return avail==="both";
    } else {
      // For assigned slots, match on the class delivery type
      if(mode==="ip"    ) return assignedDelivery!=="online";
      if(mode==="online") return assignedDelivery==="online";
      if(mode==="both"  ) return false; // assigned slots are one delivery type, not "both"
    }
    return false;
  }

  // Build a map of day|slot → delivery for assigned classes
  function assignedDeliveryMap(profile){
    const map={};
    const {lead,shadow}=classesForProfile(profile);
    [...lead,...shadow].forEach(cls=>{
      assignedSlotsForClass(cls).forEach(key=>{map[key]=cls.delivery||"in-person";});
    });
    return map;
  }

  const deliveryByUid={};
  allProfiles.forEach(p=>{ deliveryByUid[p.uid]=assignedDeliveryMap(p); });

  const insts=allProfiles.filter(p=>{
    if(p.active===false) return false;
    if(q&&!(p.displayName||"").toLowerCase().includes(q)) return false;
    const blocked=blockedByUid[p.uid];
    const delivMap=deliveryByUid[p.uid];
    for(const d of days) for(const s of slots){
      const key=`${d}|${s}`;
      const isAssigned=blocked.has(key);
      const avail=(p.availability?.[d]||{})[s]||"none";
      const assignedDel=delivMap[key]||"in-person";
      if(filt==="assigned"){ if(isAssigned && slotMatchesMode(avail,true,assignedDel,mode)) return true; continue; }
      if(filt==="free"    ){ if(isAssigned||avail==="none") continue; }
      // filt==="all"
      if(!isAssigned && avail==="none") continue;
      if(slotMatchesMode(avail,isAssigned,assignedDel,mode)) return true;
    }
    return false;
  });

  if(!insts.length){wrap.innerHTML='<div class="empty">No instructors match these filters.</div>';return;}

  // Build columns — slots where at least one instructor has something to show
  const cols=[];
  for(const d of days) for(const s of slots){
    const key=`${d}|${s}`;
    const any=insts.some(p=>{
      const blocked=blockedByUid[p.uid];
      const isAssigned=blocked.has(key);
      const avail=(p.availability?.[d]||{})[s]||"none";
      if(filt==="assigned") return isAssigned;
      if(filt==="free")     return !isAssigned&&avail!=="none";
      return isAssigned||avail!=="none";
    });
    if(any) cols.push({day:d,slot:s});
  }

  if(!cols.length){wrap.innerHTML='<div class="empty">No availability matches these filters.</div>';return;}

  wrap.innerHTML=`<div style="overflow-x:auto;"><table class="rollup-table"><thead><tr>
    <th>Instructor</th>
    ${cols.map(({day,slot})=>`<th style="white-space:nowrap;">${day}<br/><span style="font-weight:400;color:var(--muted);">${slot}</span></th>`).join('')}
  </tr></thead><tbody>
  ${insts.map(p=>{
    const blocked=blockedByUid[p.uid];
    return`<tr>
      <td style="font-weight:500;cursor:pointer;color:var(--accent);" onclick="showTab('instructors');openProf('${p.uid}')">${p.displayName}</td>
      ${cols.map(({day,slot})=>{
        const key=`${day}|${slot}`;
        const isAssigned=blocked.has(key);
        const avail=(p.availability?.[day]||{})[slot]||"none";
        if(isAssigned){
          // Determine lead vs shadow
          const {lead}=classesForProfile(p);
          const isLead=lead.some(cls=>{
            const d=DAYS.find(d=>(cls.day||'').toLowerCase().startsWith(d.toLowerCase()));
            return assignedSlotsForClass(cls).has(key);
          });
          return isLead
            ? `<td title="Assigned as lead"><span class="pip pip-class">📚 Lead</span></td>`
            : `<td title="Assigned as shadow"><span class="pip pip-shadow">👁 Shadow</span></td>`;
        }
        if(avail==="none") return`<td></td>`;
        return`<td><span class="pip ${avail==='ip'?'pip-ip':avail==='online'?'pip-online':'pip-both'}">${LABELS[avail]}</span></td>`;
      }).join('')}
    </tr>`;
  }).join('')}
  </tbody></table></div>`;
};

// ── CONFLICTS ──
function renderConflicts(){
  const el=document.getElementById("tab-conflicts");
  const conflicts=detectConflicts();
  const inactive=allProfiles.filter(p=>p.active===false);
  el.innerHTML=`
    <div style="margin-bottom:24px;"><div class="section-label" style="margin-bottom:10px;">Detected conflicts (${conflicts.length})</div>
      ${conflicts.length?conflicts.map(c=>`<div class="conflict-card"><div class="conflict-title">${c.type}</div><div class="conflict-detail">${c.detail}</div>
        <div style="margin-top:6px;">${c.tags.map(t=>`<span class="conflict-tag">${t}</span>`).join('')}</div></div>`).join('')
        :'<div class="empty">No conflicts detected.</div>'}
    </div>
    <div><div class="section-label" style="margin-bottom:10px;">Inactive instructors (${inactive.length})</div>
      ${inactive.map(p=>`<div style="background:var(--surface);border:1px solid rgba(248,81,73,.2);border-radius:10px;padding:10px 14px;margin-bottom:8px;font-size:13px;">
        <span style="font-weight:600;color:#ffa198;">${p.displayName}</span>
        ${p.notes?`<span style="color:var(--muted);margin-left:8px;">${p.notes}</span>`:''}
      </div>`).join('')}
    </div>`;
}
// Extract the school year prefix from a class ID (e.g. "25-1081" → "25", "1081" → null)
function classYear(classId) {
  const m = (classId||'').match(/^(\d{2})-/);
  return m ? m[1] : null;
}
// Two classes conflict only if they have the same year prefix (or neither has one)
function sameYear(a, b) {
  const ya=classYear(a), yb=classYear(b);
  return ya===yb; // both null, or both same prefix
}

function detectConflicts(){
  const C=[];
  // Double-booked lead — only flag if same school year
  const bl={};
  allClasses.forEach(c=>{const p=matchProfile(c.instructor);if(!p)return;const k=`${p.uid}|${(c.day||'').slice(0,3).toLowerCase()}|${c.time}`;if(!bl[k])bl[k]=[];bl[k].push(c);});
  Object.entries(bl).forEach(([,cls])=>{
    if(cls.length>1){
      // Group by year — only flag within-year collisions
      const byYear={};
      cls.forEach(c=>{const y=classYear(c.classId)||'_';if(!byYear[y])byYear[y]=[];byYear[y].push(c);});
      Object.values(byYear).forEach(grp=>{
        if(grp.length>1){const p=matchProfile(grp[0].instructor);
          C.push({type:"Double-booked lead",detail:`${p?.displayName||grp[0].instructor} is lead on ${grp.length} overlapping classes in the same school year: ${grp.map(c=>c.classId).join(', ')}`,tags:[p?.displayName,...grp.map(c=>c.classId)]});}
      });
    }
  });
  // Lead also shadow — year-aware
  allClasses.forEach(c=>{const lead=matchProfile(c.instructor);if(!lead)return;
    c.shadows.forEach(s=>{const sp=matchProfile(s);if(sp&&sp.uid===lead.uid)
      C.push({type:"Lead also listed as shadow",detail:`${lead.displayName} is both lead and shadow on ${c.classId}.`,tags:[lead.displayName,c.classId]});});});
  // Inactive assigned
  allClasses.forEach(c=>{
    const lead=matchProfile(c.instructor);
    if(lead&&lead.active===false) C.push({type:"Inactive instructor — lead",detail:`${lead.displayName} is inactive but assigned as lead on ${c.classId}.`,tags:[lead.displayName,c.classId]});
    c.shadows.forEach(s=>{const sp=matchProfile(s);if(sp&&sp.active===false)
      C.push({type:"Inactive instructor — shadow",detail:`${sp.displayName} is inactive but listed as shadow on ${c.classId}.`,tags:[sp.displayName,c.classId]});});});
  // Assigned outside availability — check all 4 slots a class occupies
  allClasses.forEach(c=>{
    const day=DAYS.find(d=>(c.day||'').toLowerCase().startsWith(d.toLowerCase()));if(!day) return;
    const classSlots=[...assignedSlotsForClass(c)].map(k=>k.split('|')[1]);
    if(!classSlots.length) return;
    const check=(csvName,role)=>{
      const p=matchProfile(csvName);if(!p||p.active===false)return;
      // Flag if none of the class slots are marked available
      const hasAny=classSlots.some(s=>(p.availability?.[day]||{})[s]&&(p.availability[day][s]!=='none'));
      if(!hasAny) C.push({type:"Assigned outside stated availability",
        detail:`${p.displayName} is ${role} on ${c.classId} (${day} ${c.time}) but hasn't marked any of those slots as available.`,
        tags:[p.displayName,c.classId,day,c.time]});
    };
    if(c.instructor) check(c.instructor,'lead');
    c.shadows.forEach(s=>check(s,'shadow'));
  });
  return C;
}

// ── SHADOW TRACKER ──
function renderShadows(){
  const el=document.getElementById("tab-shadows");
  const rels=[];
  allClasses.forEach(c=>c.shadows.forEach(s=>{const p=matchProfile(s);if(p) rels.push({profile:p,cls:c});}));
  if(!rels.length){el.innerHTML=`<div class="empty">No shadow instructors in current class data.<br><br>Add a <code>Shadows</code> column to your CSV with semicolon-separated names.</div>`;return;}
  const byUid={};
  rels.forEach(r=>{if(!byUid[r.profile.uid])byUid[r.profile.uid]={profile:r.profile,classes:[]};byUid[r.profile.uid].classes.push(r.cls);});
  const cleared=rels.filter(r=>gsd(r.cls.classId,r.profile.uid).cleared).length;
  el.innerHTML=`
    <div class="metrics" style="grid-template-columns:repeat(3,1fr);">
      <div class="metric"><div class="metric-label">Shadow instructors</div><div class="metric-value purple">${Object.keys(byUid).length}</div></div>
      <div class="metric"><div class="metric-label">Assignments</div><div class="metric-value">${rels.length}</div></div>
      <div class="metric"><div class="metric-label">Cleared to lead</div><div class="metric-value ok">${cleared}</div></div>
    </div>
    ${Object.values(byUid).sort((a,b)=>(a.profile.displayName||'').localeCompare(b.profile.displayName||'')).map(({profile:p,classes})=>{
      const c=ac(p.displayName);
      return`<div style="margin-bottom:24px;">
        <div style="display:flex;align-items:center;gap:10px;margin-bottom:10px;">
          <div style="width:32px;height:32px;border-radius:50%;background:${c.bg};color:${c.txt};display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;">${ini(p.displayName)}</div>
          <span style="font-family:'Fraunces',serif;font-size:18px;font-weight:700;color:#d2a8ff;">${p.displayName}</span>
          <span style="font-size:12px;color:var(--muted);">${classes.length} class${classes.length!==1?'es':''}</span>
        </div>
        ${classes.map(cls=>{const cid=cls.classId;const d=gsd(cid,p.uid);const eid=`${cid.replace(/\W/g,'_')}_${p.uid.slice(0,8)}`;
          return`<div class="shadow-tracker-card">
            <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;">
              <div><div style="font-weight:700;font-size:14px;color:#d2a8ff;">${cid}</div>
                <div style="font-size:12px;color:var(--muted);">${[cls.day,cls.time,cls.instructor?`Lead: ${cls.instructor}`:''].filter(Boolean).join(' · ')}</div>
              </div>
              <div style="display:flex;align-items:center;gap:8px;">
                <button class="sc-btn" onclick="sadj('${cid}','${p.uid}','${eid}',-1)">−</button>
                <div style="text-align:center;"><div class="sc-val" id="sv-${eid}">${d.sessions}</div><div style="font-size:10px;color:var(--muted);">sessions</div></div>
                <button class="sc-btn" onclick="sadj('${cid}','${p.uid}','${eid}',1)">+</button>
              </div>
            </div>
            <textarea class="shadow-notes" rows="2" placeholder="Notes…" id="sn-${eid}"
              onchange="snote('${cid}','${p.uid}','${eid}')" oninput="snote('${cid}','${p.uid}','${eid}')">${d.notes}</textarea>
            <label class="cleared-label${d.cleared?' is-cleared':''}" id="sc-${eid}">
              <input type="checkbox" ${d.cleared?'checked':''} onchange="sclr('${cid}','${p.uid}','${eid}',this)"/>
              Cleared to lead independently
            </label>
          </div>`;}).join('')}
      </div>`;}).join('')}`;
}
const gsd=(cid,uid)=>{try{return JSON.parse(localStorage.getItem(`bm_sh_${cid}_${uid}`))||{sessions:0,notes:'',cleared:false};}catch{return{sessions:0,notes:'',cleared:false};}};
const ssd=(cid,uid,d)=>{try{localStorage.setItem(`bm_sh_${cid}_${uid}`,JSON.stringify(d));}catch{}};
window.sadj=(cid,uid,eid,delta)=>{const d=gsd(cid,uid);d.sessions=Math.max(0,d.sessions+delta);ssd(cid,uid,d);const e=document.getElementById(`sv-${eid}`);if(e)e.textContent=d.sessions;};
window.snote=(cid,uid,eid)=>{const ta=document.getElementById(`sn-${eid}`);if(!ta)return;const d=gsd(cid,uid);d.notes=ta.value;ssd(cid,uid,d);};
window.sclr=(cid,uid,eid,cb)=>{const d=gsd(cid,uid);d.cleared=cb.checked;ssd(cid,uid,d);const l=document.getElementById(`sc-${eid}`);if(l)l.classList.toggle('is-cleared',d.cleared);};

window.doSignOut=async()=>{await fbSignOut(auth);window.location.href="login.html";};
</script>
